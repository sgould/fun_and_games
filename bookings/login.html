<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bookings Calendar — Log In</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Crect x='2' y='4' width='20' height='18' rx='2' fill='%231565c0'/%3E%3Crect x='2' y='4' width='20' height='5' rx='2' fill='%230d47a1'/%3E%3Crect x='6' y='1' width='2' height='5' rx='1' fill='%230d47a1'/%3E%3Crect x='16' y='1' width='2' height='5' rx='1' fill='%230d47a1'/%3E%3Cg fill='%23ffffff'%3E%3Crect x='5' y='12' width='3' height='3'/%3E%3Crect x='10.5' y='12' width='3' height='3'/%3E%3Crect x='16' y='12' width='3' height='3'/%3E%3Crect x='5' y='17' width='3' height='3'/%3E%3Crect x='10.5' y='17' width='3' height='3'/%3E%3C/g%3E%3C/svg%3E">
<style>
  * { box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #fafafa;
    color: #222;
  }

  .login-card {
    background: #fff;
    border: 1px solid #d0d0d0;
    border-radius: 10px;
    padding: 32px;
    width: 320px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }

  .login-card h1 {
    font-size: 1.2rem;
    margin: 0 0 20px;
    text-align: center;
  }

  .login-card input[type=password] {
    width: 100%;
    font-size: 1rem;
    padding: 10px;
    border: 1px solid #d0d0d0;
    border-radius: 6px;
    margin-bottom: 12px;
  }

  .login-card button {
    width: 100%;
    font-size: 1rem;
    padding: 10px;
    border: 1px solid #1565c0;
    background: #1565c0;
    color: #fff;
    border-radius: 6px;
    cursor: pointer;
  }
  .login-card button:hover { background: #0d47a1; }
  .login-card button:disabled { opacity: 0.6; cursor: not-allowed; }

  .error {
    color: #c62828;
    font-size: 0.85rem;
    margin-bottom: 12px;
    min-height: 1em;
    text-align: center;
  }
</style>
</head>
<body>

<div class="login-card">
  <h1>Bookings Calendar</h1>
  <div class="error" id="errorMsg"></div>
  <input type="password" id="passwordInput" placeholder="Password" autofocus />
  <button id="loginBtn">Log In</button>
</div>

<script>
(function () {
  const passwordInput = document.getElementById('passwordInput');
  const loginBtn = document.getElementById('loginBtn');
  const errorMsg = document.getElementById('errorMsg');

  async function attemptLogin() {
    const password = passwordInput.value;
    if (!password) return;
    loginBtn.disabled = true;
    errorMsg.textContent = '';
    try {
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password })
      });
      const body = await res.json().catch(() => ({}));
      if (res.ok) {
        window.location.href = '/';
        return;
      }
      errorMsg.textContent = body.error || `Login failed (${res.status})`;
    } catch (e) {
      errorMsg.textContent = 'Could not reach the server.';
    }
    loginBtn.disabled = false;
    passwordInput.select();
  }

  loginBtn.addEventListener('click', attemptLogin);
  passwordInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      e.preventDefault();
      attemptLogin();
    }
  });
})();
</script>

</body>
</html>
